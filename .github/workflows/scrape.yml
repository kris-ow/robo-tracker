name: scrape

on:
  schedule:
    # 03:00 / 11:00 / 19:00 UTC = 04 / 12 / 20 CET (winter), 05 / 13 / 21 CEST (summer).
    - cron: '0 3,11,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run scrape
      - name: Commit counts.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/counts.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update counts $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
